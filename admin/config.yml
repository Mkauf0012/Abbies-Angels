# Decap CMS Configuration for Abbies Angels
# Docs: https://decapcms.org/docs/

backend:
  name: git-gateway
  branch: main
  site_url: https://dancing-treacle-6631ef.netlify.app

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # --- EVENTS (individual entries) ---
  - name: "events"
    label: "Events"
    label_singular: "Event"
    folder: "_data/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Registration Link", name: "link", widget: "string", required: false }
      - { label: "Featured Image", name: "image", widget: "image", required: false }

  # --- HIGHLIGHTS / SPONSORSHIPS ---
  - name: "highlights"
    label: "Highlights"
    label_singular: "Highlight"
    folder: "_data/highlights"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Month", name: "month", widget: "string", hint: "e.g. March 2026" }
      - { label: "Category", name: "category", widget: "select", options: ["Family Spotlight", "Resource", "Monthly Sponsor", "Community Partner"] }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Link (optional)", name: "link", widget: "string", required: false }

  # --- HOMEPAGE SECTIONS ---
  - name: "homepage"
    label: "Homepage"
    files:
      - label: "Hero Section"
        name: "hero"
        file: "_data/homepage/hero.yml"
        fields:
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Subheadline", name: "subheadline", widget: "text" }
          - { label: "Primary Button Text", name: "cta_primary_text", widget: "string" }
          - { label: "Primary Button Link", name: "cta_primary_link", widget: "string" }
          - { label: "Secondary Button Text", name: "cta_secondary_text", widget: "string", required: false }
          - { label: "Secondary Button Link", name: "cta_secondary_link", widget: "string", required: false }
          - { label: "Meta Text (below buttons)", name: "hero_meta", widget: "string", required: false }

      - label: "Hero Card (right side)"
        name: "hero_card"
        file: "_data/homepage/hero_card.yml"
        fields:
          - { label: "Card Title", name: "title", widget: "string" }
          - { label: "Event Date", name: "date_label", widget: "string" }
          - { label: "Event Time", name: "time_label", widget: "string" }
          - { label: "Location", name: "location_label", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Card Image", name: "image", widget: "image" }
          - { label: "Image Alt Text", name: "image_alt", widget: "string" }
          - { label: "Ticket / CTA URL", name: "ticket_url", widget: "string" }

      - label: "Mission Section"
        name: "mission"
        file: "_data/homepage/mission.yml"
        fields:
          - { label: "Section Heading", name: "heading", widget: "string" }
          - { label: "Paragraph 1", name: "body_1", widget: "text" }
          - { label: "Paragraph 2", name: "body_2", widget: "text", required: false }

      - label: "What We Do Section"
        name: "what_we_do"
        file: "_data/homepage/what_we_do.yml"
        fields:
          - { label: "Section Heading", name: "heading", widget: "string" }
          - { label: "Card 1 Title", name: "card_1_title", widget: "string" }
          - { label: "Card 1 Body", name: "card_1_body", widget: "text" }
          - { label: "Card 2 Title", name: "card_2_title", widget: "string" }
          - { label: "Card 2 Body", name: "card_2_body", widget: "text" }
          - { label: "Card 3 Title", name: "card_3_title", widget: "string" }
          - { label: "Card 3 Body", name: "card_3_body", widget: "text" }

  # --- PAGE SECTIONS ---
  - name: "sections"
    label: "Page Sections"
    files:
      - label: "Events Section"
        name: "events_section"
        file: "_data/sections/events.yml"
        fields:
          - { label: "Section Heading", name: "heading", widget: "string" }
          - { label: "Intro Paragraph", name: "intro", widget: "text" }
          - { label: "Bullet 1", name: "bullet_1", widget: "string" }
          - { label: "Bullet 2", name: "bullet_2", widget: "string" }
          - { label: "Bullet 3", name: "bullet_3", widget: "string" }
          - { label: "Footer Note", name: "footer_note", widget: "string", required: false }
          - { label: "Featured Card Title", name: "featured_card_title", widget: "string" }
          - { label: "Featured Card Intro", name: "featured_card_intro", widget: "text" }
          - { label: "Featured Card Body", name: "featured_card_body", widget: "text" }
          - { label: "Featured Card Extra Note", name: "featured_card_wexler_note", widget: "text", required: false }
          - { label: "GoFundMe Button Label", name: "featured_card_gofundme_label", widget: "string", required: false }
          - { label: "GoFundMe URL", name: "featured_card_gofundme_url", widget: "string", required: false }
          - { label: "Tickets Button Label", name: "featured_card_tickets_label", widget: "string" }
          - { label: "Tickets URL", name: "featured_card_tickets_url", widget: "string" }

      - label: "Ways to Help Section"
        name: "support"
        file: "_data/sections/support.yml"
        fields:
          - { label: "Section Heading", name: "heading", widget: "string" }
          - { label: "Intro Paragraph", name: "intro", widget: "text" }
          - { label: "Bullet 1", name: "bullet_1", widget: "string" }
          - { label: "Bullet 2", name: "bullet_2", widget: "string" }
          - { label: "Bullet 3", name: "bullet_3", widget: "string" }
          - { label: "Bullet 4", name: "bullet_4", widget: "string", required: false }
          - { label: "Give Today Card Title", name: "card_title", widget: "string" }
          - { label: "Give Today Card Body", name: "card_body", widget: "text" }
          - { label: "Give Today Link Label", name: "card_link_label", widget: "string" }
          - { label: "Give Today Link URL", name: "card_link_url", widget: "string" }

      - label: "Contact Section Intro"
        name: "contact_intro"
        file: "_data/sections/contact_intro.yml"
        fields:
          - { label: "Section Heading", name: "heading", widget: "string" }
          - { label: "Intro Paragraph", name: "intro", widget: "text" }

  # --- GALLERY PAGE ---
  - name: "gallery"
    label: "Gallery Page"
    files:
      - label: "Page Intro"
        name: "gallery_page"
        file: "_data/gallery/page.yml"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Page Intro", name: "intro", widget: "text" }
          - { label: "Event Highlights Heading", name: "highlights_heading", widget: "string" }
          - { label: "Event Highlights Intro", name: "highlights_intro", widget: "text" }
          - { label: "Family Spotlight Heading", name: "spotlight_heading", widget: "string" }
          - { label: "Family Spotlight Intro", name: "spotlight_intro", widget: "text" }

      - label: "Family Spotlight"
        name: "spotlight"
        file: "_data/gallery/spotlight.yml"
        fields:
          - { label: "Spotlight Title", name: "title", widget: "string" }
          - { label: "Photo", name: "image", widget: "image" }
          - { label: "Photo Alt Text", name: "image_alt", widget: "string" }
          - { label: "Paragraph 1", name: "body_1", widget: "text" }
          - { label: "Paragraph 2", name: "body_2", widget: "text" }
          - { label: "Paragraph 3 (before GoFundMe link)", name: "body_3", widget: "string", required: false }
          - { label: "GoFundMe Link Label", name: "gofundme_label", widget: "string", required: false }
          - { label: "GoFundMe URL", name: "gofundme_url", widget: "string", required: false }
          - { label: "Paragraph 4", name: "body_4", widget: "text", required: false }

      - label: "Gallery Tiles"
        name: "tiles"
        file: "_data/gallery/tiles.yml"
        fields:
          - label: "Tiles"
            name: "tiles"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Caption", name: "caption", widget: "text" }

  # --- TEAM ---
  - name: "team"
    label: "Team"
    files:
      - label: "Board Members"
        name: "board"
        file: "_data/team/board.yml"
        fields:
          - label: "Members"
            name: "members"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Photo", name: "image", widget: "image" }

      - label: "Staff & Volunteers"
        name: "staff"
        file: "_data/team/staff.yml"
        fields:
          - label: "Members"
            name: "members"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Photo", name: "image", widget: "image" }

  # --- SITE SETTINGS ---
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Donation Button"
        name: "donation"
        file: "_data/settings/donation.yml"
        fields:
          - { label: "Donate Button Text", name: "button_text", widget: "string", default: "Donate" }
          - { label: "Donate Button URL", name: "button_url", widget: "string" }
          - { label: "Show Donate Button", name: "enabled", widget: "boolean", default: true }

      - label: "Contact Info"
        name: "contact"
        file: "_data/settings/contact.yml"
        fields:
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Phone (optional)", name: "phone", widget: "string", required: false }
          - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }
          - { label: "Mailing Name", name: "mailing_name", widget: "string", required: false }
          - { label: "Mailing Street", name: "mailing_street", widget: "string", required: false }
          - { label: "Mailing City/State/ZIP", name: "mailing_city", widget: "string", required: false }
