heading: "Ways to Help"
intro: "Every gift, share, and hour of service helps us walk alongside more families in honor of Abbie and all of our community's warriors."
bullet_1: "Make a one-time or recurring donation to support caregiver programs and events."
bullet_2: "Sponsor an event, family, or specific initiative as an individual or business."
bullet_3: "Volunteer at events, help with set-up/tear-down, or serve on a planning committee."
bullet_4: "Share our posts and invite others to follow along on Facebook, Instagram, and LinkedIn."
card_title: "Give Today"
card_body: "Online giving, checks, and in-kind donations all make a tangible difference. To arrange a donation or sponsorship, you can give through our Auctria page, mail a gift, or reach out to our team to talk about the best way to help."
card_link_label: "Visit our Auctria page to donate or sponsor."
card_link_url: "https://auctria.events/abbiesangels2025"
