heading: "Events"
intro: "Abbie's Angels hosts special events that bring light into difficult seasons and raise funds to sustain our mission all year."
bullet_1: "Annual Winter Gala with dinner, auctions, and inspiring stories."
bullet_2: "Community fundraisers and awareness nights with local partners."
bullet_3: "Future events highlighting families and caregivers in our community."
footer_note: "For the most up-to-date event schedule, visit our social media and click Follow."
featured_card_title: "Get Gala Tickets"
featured_card_intro: "Join us at Salvatore's Hospitality for a night of generosity, stories, and hope."
featured_card_body: "This year's Gala will help support Chelsea Campbell, an 8-year-old twin and little sister who was diagnosed with Acute Myeloid Leukemia in June 2025 and is preparing for a bone marrow transplant on December 22. Please keep Chelsea and her parents, Twan Campbell and JoAnnah Piedmonte, in your thoughts."
featured_card_wexler_note: "One of our board members, Laura Wexler, had the joy of teaching both Chelsea and Abbie when they were babies, making this year's sponsorship especially close to our hearts."
featured_card_gofundme_label: "Donate to Chelsea's Journey to Health"
featured_card_gofundme_url: "https://www.gofundme.com/f/donate-to-chelseas-journey-to-health"
