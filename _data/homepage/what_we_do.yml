heading: "What We Do"
card_1_title: "Caregiver Support"
card_1_body: "Helping families find the right resources during and after a medical crisis, from parking and meal expenses to in-home support services, and equipment. This way they spend less time searching and more time caring."
card_2_title: "Events & Gatherings"
card_2_body: "Host annual events like our Winter Gala to celebrate families, raise awareness, and sustain support programs throughout the year."
card_3_title: "Community Outreach"
card_3_body: "Partner with local hospitals, schools, organizations, and businesses to reach caregivers who need encouragement, financial assistance, and connection to specialized services."
