<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Abbie's Angels – CMS Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewStyle('/admin/preview.css');

    // ── Hero Section Preview ──────────────────────────────────────────
    var HeroPreview = createClass({
      render: function() {
        var entry = this.props.entry;
        return h('div', {style: {fontFamily: 'system-ui', padding: '24px', background: '#f7fafc'}},
          h('div', {style: {background: '#fff', borderRadius: '16px', padding: '24px', boxShadow: '0 4px 16px rgba(0,0,0,0.08)'}},
            h('div', {style: {display: 'inline-block', background: '#ffd94a', borderRadius: '999px', padding: '4px 12px', fontSize: '0.8rem', marginBottom: '12px'}},
              '501(c)(3) Nonprofit · Lockport, NY'
            ),
            h('h1', {style: {color: '#0055a4', fontSize: '2rem', marginBottom: '10px'}}, entry.getIn(['data', 'headline']) || 'Headline'),
            h('p', {style: {color: '#666', marginBottom: '16px'}}, entry.getIn(['data', 'subheadline']) || 'Subheadline'),
            h('div', {style: {display: 'flex', gap: '12px'}},
              h('a', {style: {background: '#0055a4', color: '#fff', padding: '10px 20px', borderRadius: '999px', textDecoration: 'none', fontWeight: '600'}},
                entry.getIn(['data', 'cta_primary_text']) || 'Primary Button'
              ),
              entry.getIn(['data', 'cta_secondary_text']) && h('a', {style: {border: '2px solid #0055a4', color: '#0055a4', padding: '10px 20px', borderRadius: '999px', textDecoration: 'none', fontWeight: '600'}},
                entry.getIn(['data', 'cta_secondary_text'])
              )
            ),
            h('p', {style: {color: '#999', fontSize: '0.85rem', marginTop: '10px'}}, entry.getIn(['data', 'hero_meta']))
          )
        );
      }
    });
    CMS.registerPreviewTemplate('hero', HeroPreview);

    // ── Hero Card Preview ─────────────────────────────────────────────
    var HeroCardPreview = createClass({
      render: function() {
        var entry = this.props.entry;
        var img = entry.getIn(['data', 'image']);
        return h('div', {style: {fontFamily: 'system-ui', padding: '24px', background: '#f7fafc'}},
          h('div', {style: {background: '#fff', borderRadius: '16px', padding: '16px', boxShadow: '0 4px 16px rgba(0,0,0,0.08)', maxWidth: '360px'}},
            img && h('img', {src: img, style: {width: '100%', borderRadius: '12px', marginBottom: '10px', height: '200px', objectFit: 'cover'}}),
            h('h2', {style: {color: '#0055a4', fontSize: '1.05rem', marginBottom: '8px'}}, entry.getIn(['data', 'title']) || 'Card Title'),
            h('p', {style: {fontSize: '0.9rem', color: '#555', marginBottom: '6px'}},
              h('strong', {}, 'Date: '), entry.getIn(['data', 'date_label'])
            ),
            h('p', {style: {fontSize: '0.9rem', color: '#555', marginBottom: '6px'}},
              h('strong', {}, 'Time: '), entry.getIn(['data', 'time_label'])
            ),
            h('p', {style: {fontSize: '0.9rem', color: '#555', marginBottom: '6px'}},
              h('strong', {}, 'Location: '), entry.getIn(['data', 'location_label'])
            ),
            h('p', {style: {fontSize: '0.9rem', color: '#666'}}, entry.getIn(['data', 'description']))
          )
        );
      }
    });
    CMS.registerPreviewTemplate('hero_card', HeroCardPreview);

    // ── Mission Preview ───────────────────────────────────────────────
    var MissionPreview = createClass({
      render: function() {
        var entry = this.props.entry;
        return h('div', {style: {fontFamily: 'system-ui', padding: '32px', maxWidth: '800px'}},
          h('h2', {style: {color: '#0055a4', fontSize: '1.5rem', borderLeft: '4px solid #f4b321', paddingLeft: '10px', marginBottom: '12px'}},
            entry.getIn(['data', 'heading']) || 'Mission'
          ),
          h('p', {style: {color: '#555', marginBottom: '10px'}}, entry.getIn(['data', 'body_1'])),
          entry.getIn(['data', 'body_2']) && h('p', {style: {color: '#555'}}, entry.getIn(['data', 'body_2']))
        );
      }
    });
    CMS.registerPreviewTemplate('mission', MissionPreview);

    // ── Gallery Tiles Preview ─────────────────────────────────────────
    var TilesPreview = createClass({
      render: function() {
        var entry = this.props.entry;
        var tiles = entry.getIn(['data', 'tiles']);
        var tileList = tiles ? tiles.toJS() : [];
        return h('div', {style: {fontFamily: 'system-ui', padding: '24px'}},
          h('h2', {style: {color: '#0055a4', borderLeft: '4px solid #f4b321', paddingLeft: '10px', marginBottom: '16px'}}, 'Gallery Tiles Preview'),
          h('div', {style: {display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px,1fr))', gap: '16px'}},
            tileList.map(function(t, i) {
              return h('div', {key: i, style: {border: '1px solid #e2e8f0', borderRadius: '12px', overflow: 'hidden', background: '#fff', boxShadow: '0 4px 12px rgba(0,0,0,0.04)'}},
                t.image && h('img', {src: t.image, style: {width: '100%', height: '180px', objectFit: 'cover', display: 'block'}}),
                h('div', {style: {padding: '10px 12px'}},
                  h('h3', {style: {color: '#0055a4', fontSize: '0.95rem', marginBottom: '4px'}}, t.title),
                  h('p', {style: {color: '#666', fontSize: '0.85rem', margin: 0}}, t.caption)
                )
              );
            })
          )
        );
      }
    });
    CMS.registerPreviewTemplate('tiles', TilesPreview);

    // ── Spotlight Preview ─────────────────────────────────────────────
    var SpotlightPreview = createClass({
      render: function() {
        var entry = this.props.entry;
        var img = entry.getIn(['data', 'image']);
        return h('div', {style: {fontFamily: 'system-ui', padding: '24px'}},
          h('div', {style: {display: 'grid', gridTemplateColumns: '1fr 1.2fr', gap: '18px', border: '1px solid #e2e8f0', borderRadius: '16px', padding: '16px', background: '#fff', boxShadow: '0 4px 16px rgba(0,0,0,0.06)'}},
            img && h('img', {src: img, style: {width: '100%', maxHeight: '380px', borderRadius: '12px', objectFit: 'contain'}}),
            h('div', {},
              h('h3', {style: {color: '#0055a4', fontSize: '1.1rem', marginBottom: '8px'}}, entry.getIn(['data', 'title'])),
              h('p', {style: {color: '#555', fontSize: '0.92rem', marginBottom: '8px'}}, entry.getIn(['data', 'body_1'])),
              h('p', {style: {color: '#555', fontSize: '0.92rem', marginBottom: '8px'}}, entry.getIn(['data', 'body_2'])),
              h('p', {style: {color: '#555', fontSize: '0.92rem', marginBottom: '8px'}},
                entry.getIn(['data', 'body_3']), ' ',
                entry.getIn(['data', 'gofundme_url']) && h('a', {href: entry.getIn(['data', 'gofundme_url']), style: {color: '#0055a4'}},
                  entry.getIn(['data', 'gofundme_label'])
                )
              ),
              entry.getIn(['data', 'body_4']) && h('p', {style: {color: '#555', fontSize: '0.92rem'}}, entry.getIn(['data', 'body_4']))
            )
          )
        );
      }
    });
    CMS.registerPreviewTemplate('spotlight', SpotlightPreview);

    // ── Board / Staff Preview ─────────────────────────────────────────
    var TeamPreview = createClass({
      render: function() {
        var entry = this.props.entry;
        var members = entry.getIn(['data', 'members']);
        var list = members ? members.toJS() : [];
        return h('div', {style: {fontFamily: 'system-ui', padding: '24px'}},
          h('div', {style: {display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: '16px'}},
            list.map(function(m, i) {
              return h('div', {key: i, style: {border: '1px solid #e2e8f0', borderRadius: '12px', overflow: 'hidden', background: '#fff', boxShadow: '0 4px 12px rgba(0,0,0,0.04)'}},
                m.image && h('img', {src: m.image, style: {width: '100%', height: '180px', objectFit: 'cover', display: 'block'}}),
                h('div', {style: {padding: '10px 12px'}},
                  h('h3', {style: {color: '#0055a4', fontSize: '0.95rem', marginBottom: '2px'}}, m.name),
                  h('p', {style: {color: '#666', fontSize: '0.82rem', margin: 0}}, m.title)
                )
              );
            })
          )
        );
      }
    });
    CMS.registerPreviewTemplate('board', TeamPreview);
    CMS.registerPreviewTemplate('staff', TeamPreview);

    // ── Events Section Preview ────────────────────────────────────────
    var EventsPreview = createClass({
      render: function() {
        var e = this.props.entry;
        return h('div', {style: {fontFamily: 'system-ui', padding: '32px', maxWidth: '900px'}},
          h('h2', {style: {color: '#0055a4', borderLeft: '4px solid #f4b321', paddingLeft: '10px', marginBottom: '12px'}},
            e.getIn(['data', 'heading'])
          ),
          h('p', {style: {color: '#555', marginBottom: '10px'}}, e.getIn(['data', 'intro'])),
          h('ul', {style: {color: '#555', paddingLeft: '18px', marginBottom: '16px'}},
            h('li', {}, e.getIn(['data', 'bullet_1'])),
            h('li', {}, e.getIn(['data', 'bullet_2'])),
            h('li', {}, e.getIn(['data', 'bullet_3']))
          ),
          h('div', {style: {border: '1px solid #e2e8f0', borderRadius: '14px', padding: '16px', background: '#fff', boxShadow: '0 4px 12px rgba(0,0,0,0.04)'}},
            h('h3', {style: {color: '#0055a4', marginBottom: '8px'}}, e.getIn(['data', 'featured_card_title'])),
            h('p', {style: {color: '#555', fontSize: '0.92rem', marginBottom: '8px'}}, e.getIn(['data', 'featured_card_intro'])),
            h('p', {style: {color: '#555', fontSize: '0.92rem'}}, e.getIn(['data', 'featured_card_body']))
          )
        );
      }
    });
    CMS.registerPreviewTemplate('events_section', EventsPreview);

    // ── Support Section Preview ───────────────────────────────────────
    var SupportPreview = createClass({
      render: function() {
        var e = this.props.entry;
        return h('div', {style: {fontFamily: 'system-ui', padding: '32px', maxWidth: '900px'}},
          h('h2', {style: {color: '#0055a4', borderLeft: '4px solid #f4b321', paddingLeft: '10px', marginBottom: '12px'}},
            e.getIn(['data', 'heading'])
          ),
          h('p', {style: {color: '#555', marginBottom: '10px'}}, e.getIn(['data', 'intro'])),
          h('ul', {style: {color: '#555', paddingLeft: '18px', marginBottom: '16px'}},
            h('li', {}, e.getIn(['data', 'bullet_1'])),
            h('li', {}, e.getIn(['data', 'bullet_2'])),
            h('li', {}, e.getIn(['data', 'bullet_3'])),
            e.getIn(['data', 'bullet_4']) && h('li', {}, e.getIn(['data', 'bullet_4']))
          ),
          h('div', {style: {border: '1px solid #e2e8f0', borderRadius: '14px', padding: '16px', background: '#fff', boxShadow: '0 4px 12px rgba(0,0,0,0.04)'}},
            h('h3', {style: {color: '#0055a4', marginBottom: '8px'}}, e.getIn(['data', 'card_title'])),
            h('p', {style: {color: '#555', fontSize: '0.92rem', marginBottom: '10px'}}, e.getIn(['data', 'card_body'])),
            h('a', {href: e.getIn(['data', 'card_link_url']), style: {color: '#0055a4', fontWeight: '600'}},
              e.getIn(['data', 'card_link_label'])
            )
          )
        );
      }
    });
    CMS.registerPreviewTemplate('support', SupportPreview);

    // ── Contact Section Preview ───────────────────────────────────────
    var ContactPreview = createClass({
      render: function() {
        var e = this.props.entry;
        return h('div', {style: {fontFamily: 'system-ui', padding: '32px', maxWidth: '800px'}},
          h('h2', {style: {color: '#0055a4', borderLeft: '4px solid #f4b321', paddingLeft: '10px', marginBottom: '8px'}},
            e.getIn(['data', 'heading'])
          ),
          h('p', {style: {color: '#555', marginBottom: '16px'}}, e.getIn(['data', 'intro']))
        );
      }
    });
    CMS.registerPreviewTemplate('contact_intro', ContactPreview);
  </script>
</body>
</html>
